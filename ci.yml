# .github/workflows/ci.yml
# Runs on every push to main and on every pull request.
# Checks: install → lint → typecheck

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Create a dummy .env.local so Next.js doesn't crash on env vars
      - name: Create dummy .env
        run: |
          cp .env.local.example .env.local
          sed -i 's/=$/=placeholder/' .env.local

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run typecheck
